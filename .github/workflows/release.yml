name: Release

# Cut a release by pushing a SemVer tag, e.g.  git push origin v0.1.0
# (see `make release`). Builds per-OS, then publishes ONE GitHub Release.
# A tag with a prerelease part (e.g. v0.1.0-rc.1) publishes as a pre-release.
#
# workflow_dispatch runs the SAME test + per-OS build as a smoke test (artifacts
# are uploaded for download), but SKIPS publishing a Release — so you can exercise
# the pipeline from the Actions UI without cutting a version. See the publish job.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # create the release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: don't ship from red code.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test

  # Build installers per OS (no publish here — a single publish job avoids the
  # electron-builder race where parallel jobs each create a duplicate draft).
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build renderer/main/preload
        run: npm run build
      # node-pty is rebuilt by electron-builder for the packaged Electron; mac is
      # ad-hoc signed (build/after-pack.cjs). --publish never = build only.
      - name: Package installers
        run: npx electron-builder --publish never
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: ignore
          retention-days: 5

  # Collect every OS's artifacts and publish a single release for the tag.
  # Tag pushes only — a manual workflow_dispatch stops after build (no ref_name
  # tag to release, and we don't want a UI smoke test to publish).
  publish:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/**
          fail_on_unmatched_files: false
