# Git hooks (https://lefthook.dev). Activate with: make hooks
pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "{src,electron}/**/*.{ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      glob: "*.{ts,tsx,css,json,md,yml}"
      run: npx prettier --write {staged_files}
      stage_fixed: true

pre-push:
  commands:
    tests:
      run: npm run test
